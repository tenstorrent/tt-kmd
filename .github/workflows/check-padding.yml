name: 'check-padding'

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-padding:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install pahole
      run: |
        sudo apt-get update
        sudo apt-get install -y dwarves
    - name: Check ioctl.h implicit padding and ABI layout
      # Verifies no implicit padding and that no existing struct member moves,
      # resizes, or disappears vs test/ioctl_abi.golden (which freezes each
      # argsz ioctl's minsz-defining field). Regenerate the golden after an
      # intentional tail append with: test/pahole_check.sh --update-golden
      run: test/pahole_check.sh

