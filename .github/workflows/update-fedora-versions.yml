name: Update Fedora Versions 🔄

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-fedora-versions:
    name: Update Fedora versions in build-rpm.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch supported Fedora versions and update build-rpm.yml
        run: python3 tools/update-fedora-versions.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — Fedora versions are already up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff
          fi

      - name: Create draft PR with updated Fedora versions
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto/update-fedora-versions"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add .github/workflows/build-rpm.yml
          git commit -m "Update supported Fedora versions in build-rpm.yml"
          git push -f origin "${BRANCH}"

          # Open a new draft PR, or report the URL if one already exists
          EXISTING=$(gh pr list --head "${BRANCH}" --json url --jq '.[0].url')
          if [[ -n "${EXISTING}" ]]; then
            echo "Draft PR already exists: ${EXISTING}"
          else
            gh pr create \
              --title "Update Fedora versions to currently supported releases" \
              --body "$(cat <<'PREOF'
Automated update of Fedora versions in `build-rpm.yml` based on [endoflife.date](https://endoflife.date/fedora) data.

This PR was generated by the **Update Fedora Versions** workflow.
PREOF
)" \
              --draft \
              --head "${BRANCH}"
          fi
